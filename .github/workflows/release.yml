name: Release

on:
  push:
    tags:
      - "v*"

env:
  APP_NAME: SnapOCR
  SCHEME: SnapOCR

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Universal Binary
        run: |
          xcodebuild \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Locate .app
        id: app
        run: |
          APP_PATH=$(find build/Build/Products -name "${{ env.APP_NAME }}.app" | head -n 1)
          echo "APP_PATH=$APP_PATH"
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp -R "${{ steps.app.outputs.app_path }}" dist/

      - name: Zip
        run: |
          ZIP_NAME="${{ env.APP_NAME }}-${{ github.ref_name }}-macos-universal.zip"
          echo "ZIP_NAME=$ZIP_NAME"
          cd dist
          zip -r "../$ZIP_NAME" .

      - name: Attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ./${{ env.APP_NAME }}-${{ github.ref_name }}-macos-universal.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APP_NAME }}-${{ github.ref_name }}-macos-universal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
